name: Branch Deploy

on:
  push:
    branches:
      - '**'
      - '!master'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "$VITE_MAPBOX_TOKEN" ]; then
            echo "Error: VITE_MAPBOX_TOKEN is not set"
            exit 1
          fi
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Build
        run: npm run build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Deploy to Cloudflare Pages (Branch Preview)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy pages/dist --project-name=taskscore --branch=${{ github.ref_name }}

      - name: Output Preview URL
        run: |
          # Sanitize branch name for URL (Cloudflare replaces special chars with hyphens)
          BRANCH_SLUG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          echo "## Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Preview URL: https://${BRANCH_SLUG}.taskscore.pages.dev" >> $GITHUB_STEP_SUMMARY
