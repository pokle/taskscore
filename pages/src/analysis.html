<!DOCTYPE html>
<html lang="en" class="sl-theme-dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskScore - IGC Analysis</title>

    <!-- Shoelace -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>

    <!-- Map Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css">

    <!-- Google Maps API for ?provider=google -->
    <script>
        (g => { var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window; b = b[c] || (b[c] = {}); var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => { await (a = m.createElement("script")); e.set("libraries", [...r]); for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]); e.set("callback", c + ".maps." + q); a.src = `https://maps.${c}apis.com/maps/api/js?` + e; d[q] = f; a.onerror = () => h = n(Error(p + " could not load.")); a.nonce = m.querySelector("script[nonce]")?.nonce || ""; m.head.append(a) })); d[l] ? console.warn(p + " only loads once. Ignoring:", g) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)) })({
            key: "AIzaSyDkHC79OXQB3ktFGxt6Kfuz_ZD06g4VBDc",
            v: "weekly"
        });
    </script>

    <style>
        /* Minimal custom styles - let Shoelace handle theming */
        :root {
            --sl-font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: inherit;
        }

        html, body {
            height: 100%;
            background: var(--sl-color-neutral-50);
            font-family: var(--sl-font-sans);
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--sl-spacing-medium);
            height: 56px;
            background: var(--sl-color-neutral-0);
            border-bottom: 1px solid var(--sl-color-neutral-200);
            flex-shrink: 0;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: var(--sl-spacing-small);
        }

        .header-brand a {
            font-size: var(--sl-font-size-large);
            font-weight: var(--sl-font-weight-bold);
            color: var(--sl-color-neutral-900);
            text-decoration: none;
        }

        .header-brand span {
            color: var(--sl-color-neutral-500);
            font-size: var(--sl-font-size-small);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: var(--sl-spacing-small);
        }

        /* Main content area */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Desktop drawer */
        sl-drawer.desktop-drawer {
            --size: 360px;
        }

        sl-drawer.desktop-drawer::part(panel) {
            background: var(--sl-color-neutral-0);
        }

        sl-drawer.desktop-drawer::part(overlay) {
            display: none;
        }

        sl-drawer.desktop-drawer::part(close-button) {
            display: none;
        }

        /* Drawer controls */
        .drawer-controls {
            display: flex;
            flex-direction: column;
            gap: var(--sl-spacing-small);
            padding: var(--sl-spacing-medium);
            border-bottom: 1px solid var(--sl-color-neutral-200);
            background: var(--sl-color-neutral-50);
        }

        .drawer-controls sl-button {
            width: 100%;
        }

        .task-input-group {
            display: flex;
            gap: var(--sl-spacing-x-small);
        }

        .task-input-group sl-input {
            flex: 1;
        }

        /* Map container */
        .map-container {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        #map {
            position: absolute;
            inset: 0;
        }

        /* Drop zone overlay */
        .drop-zone {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .drop-zone.drag-over {
            opacity: 1;
            pointer-events: auto;
        }

        .drop-zone-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--sl-spacing-medium);
            color: var(--sl-color-neutral-0);
        }

        .drop-zone-content sl-icon {
            font-size: 48px;
            color: var(--sl-color-primary-500);
        }

        /* Status overlay */
        .map-overlay {
            position: absolute;
            top: var(--sl-spacing-medium);
            left: 160px;
            right: var(--sl-spacing-medium);
            z-index: 50;
            pointer-events: none;
        }

        #event-panel-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .event-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 100%;
            overflow: hidden;
        }

        .event-panel-header {
            padding: var(--sl-spacing-medium);
            border-bottom: 1px solid var(--sl-color-neutral-200);
        }

        .event-panel-header h2 {
            font-size: var(--sl-font-size-medium);
            font-weight: var(--sl-font-weight-semibold);
            margin: 0;
        }

        .event-panel-info {
            padding: var(--sl-spacing-small) var(--sl-spacing-medium);
            background: var(--sl-color-neutral-100);
            border-bottom: 1px solid var(--sl-color-neutral-200);
            font-size: var(--sl-font-size-small);
            color: var(--sl-color-neutral-600);
        }

        .event-panel-filters {
            padding: var(--sl-spacing-small) var(--sl-spacing-medium);
            border-bottom: 1px solid var(--sl-color-neutral-200);
        }

        .event-panel-stats {
            padding: var(--sl-spacing-x-small) var(--sl-spacing-medium);
            border-bottom: 1px solid var(--sl-color-neutral-200);
            font-size: var(--sl-font-size-small);
            color: var(--sl-color-neutral-500);
        }

        .event-panel-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--sl-spacing-small);
        }

        .event-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: var(--sl-spacing-large);
            color: var(--sl-color-neutral-500);
        }

        /* Event items */
        .event-item {
            display: flex;
            align-items: flex-start;
            gap: var(--sl-spacing-small);
            width: 100%;
            padding: var(--sl-spacing-small);
            background: transparent;
            border: none;
            border-radius: var(--sl-border-radius-medium);
            cursor: pointer;
            text-align: left;
            transition: background 0.15s;
        }

        .event-item:hover {
            background: var(--sl-color-neutral-100);
        }

        .event-item.selected {
            background: var(--sl-color-primary-100);
        }

        .event-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .event-icon svg {
            width: 16px;
            height: 16px;
        }

        .event-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .event-type {
            font-size: var(--sl-font-size-x-small);
            font-weight: var(--sl-font-weight-semibold);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--sl-color-neutral-500);
        }

        .event-desc {
            font-size: var(--sl-font-size-small);
            color: var(--sl-color-neutral-900);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-meta {
            font-size: var(--sl-font-size-x-small);
            color: var(--sl-color-neutral-500);
        }

        /* View mode: list only hides the map and expands drawer */
        .main.view-list .map-container {
            display: none;
        }

        .main.view-list sl-drawer.desktop-drawer {
            --size: 100%;
        }

        .main.view-list .event-panel-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--sl-spacing-small);
        }

        .main.view-list .event-timeline {
            display: contents;
        }

        /* MapLibre overrides for light theme */
        .maplibregl-ctrl-group {
            background: var(--sl-color-neutral-0) !important;
            border: 1px solid var(--sl-color-neutral-200) !important;
        }

        .maplibregl-popup-content {
            background: var(--sl-color-neutral-0) !important;
            padding: var(--sl-spacing-small) !important;
            border-radius: var(--sl-border-radius-medium) !important;
            box-shadow: var(--sl-shadow-large) !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 0 var(--sl-spacing-small);
            }

            .header-brand span {
                display: none;
            }

            sl-drawer.desktop-drawer {
                display: none;
            }

            .map-overlay {
                left: var(--sl-spacing-small);
                top: 60px;
            }
        }

        /* Drawer panel for mobile */
        sl-drawer::part(panel) {
            background: var(--sl-color-neutral-0);
        }

        sl-drawer .event-panel {
            min-width: auto;
        }

        /* Style Selector Control (MapLibre) */
        .style-selector {
            display: flex;
            flex-direction: row !important;
            gap: 0 !important;
        }

        .style-selector-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--sl-color-neutral-0);
            border: none;
            border-right: 1px solid var(--sl-color-neutral-200);
            cursor: pointer;
            transition: all 0.15s;
            color: var(--sl-color-neutral-900);
        }

        .style-selector-btn:last-child {
            border-right: none;
        }

        .style-selector-btn:hover {
            background: var(--sl-color-neutral-100);
        }

        .style-selector-btn.active {
            background: var(--sl-color-primary-600);
            color: var(--sl-color-neutral-0);
        }

        .style-selector-btn .style-icon {
            font-size: 1rem;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <a href="/">TaskScore</a>
                <span>IGC Analysis</span>
            </div>

            <div class="header-controls">
                <!-- View mode toggle -->
                <sl-button-group label="View mode">
                    <sl-button id="view-list" size="small">List</sl-button>
                    <sl-button id="view-map" size="small">Map</sl-button>
                    <sl-button id="view-both" size="small" variant="primary">Both</sl-button>
                </sl-button-group>

                <!-- Settings menu (hamburger) -->
                <sl-dropdown id="settings-dropdown">
                    <sl-button slot="trigger" size="small" caret>
                        <sl-icon name="three-dots-vertical"></sl-icon>
                    </sl-button>
                    <sl-menu>
                        <sl-menu-label>Map Provider</sl-menu-label>
                        <sl-menu-item type="checkbox" value="l" id="provider-leaflet">Leaflet</sl-menu-item>
                        <sl-menu-item type="checkbox" value="g" id="provider-google">Google Maps</sl-menu-item>
                        <sl-menu-item type="checkbox" value="m" id="provider-maplibre">MapLibre</sl-menu-item>
                        <sl-menu-item type="checkbox" value="b" id="provider-mapbox">MapBox</sl-menu-item>
                        <sl-divider></sl-divider>
                        <sl-menu-label>Display Options</sl-menu-label>
                        <sl-menu-item type="checkbox" id="menu-altitude-colors">Altitude Colors</sl-menu-item>
                        <sl-menu-item type="checkbox" id="menu-3d-track">3D Track</sl-menu-item>
                    </sl-menu>
                </sl-dropdown>
            </div>
        </header>

        <!-- Main content -->
        <main class="main" id="main-container">
            <!-- Map container -->
            <div class="map-container">
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <sl-icon name="cloud-upload"></sl-icon>
                        <p>Drop IGC file here</p>
                    </div>
                </div>
                <div id="map"></div>
                <div class="map-overlay">
                    <sl-alert id="status" variant="primary" open duration="3000" closable>
                        <sl-icon slot="icon" name="info-circle"></sl-icon>
                        Ready - drop an IGC file or use the file picker
                    </sl-alert>
                </div>
            </div>

            <!-- Event drawer (desktop) -->
            <sl-drawer id="event-drawer-desktop" class="desktop-drawer" placement="end" contained open>
                <div class="drawer-controls">
                    <sl-button id="file-btn" size="small" variant="default">
                        <sl-icon slot="prefix" name="upload"></sl-icon>
                        Choose IGC
                    </sl-button>
                    <input type="file" id="igc-file" accept=".igc" style="display: none;">
                    <div class="task-input-group">
                        <sl-input id="task-code" placeholder="Task code" size="small"></sl-input>
                        <sl-button id="load-task-btn" size="small" variant="primary">Load</sl-button>
                    </div>
                </div>
                <div id="event-panel-container"></div>
            </sl-drawer>
        </main>

        <!-- Event drawer (mobile) -->
        <sl-drawer id="event-drawer" label="Flight Events" placement="bottom" style="--size: 60vh;">
            <div class="drawer-controls">
                <sl-button id="file-btn-mobile" size="small" variant="default">
                    <sl-icon slot="prefix" name="upload"></sl-icon>
                    Choose IGC
                </sl-button>
                <input type="file" id="igc-file-mobile" accept=".igc" style="display: none;">
                <div class="task-input-group">
                    <sl-input id="task-code-mobile" placeholder="Task code" size="small"></sl-input>
                    <sl-button id="load-task-btn-mobile" size="small" variant="primary">Load</sl-button>
                </div>
            </div>
            <div id="event-drawer-container"></div>
        </sl-drawer>
    </div>

    <script type="module" src="/analysis/main.ts"></script>
</body>

</html>
