<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskScore - IGC Analysis</title>

    <!-- Styles -->
    <link rel="stylesheet" href="/styles.css">

    <!-- Basecoat JS for interactive components -->
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.10/dist/js/basecoat.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.10/dist/js/dropdown-menu.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.10/dist/js/command.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.10/dist/js/sidebar.min.js" defer></script>
</head>

<body class="h-screen overflow-hidden bg-background text-foreground">
    <div class="flex h-full flex-col">
        <!-- Header -->
        <header class="flex h-14 shrink-0 items-center justify-between border-b border-border bg-card px-4">
            <div class="flex items-center gap-3">
                <!-- Command menu button -->
                <button
                    class="btn btn-ghost btn-icon"
                    aria-label="Menu (⌘K)"
                    title="Menu (⌘K)"
                    onclick="document.getElementById('command-dialog').showModal()"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="4" x2="20" y1="12" y2="12"/>
                        <line x1="4" x2="20" y1="6" y2="6"/>
                        <line x1="4" x2="20" y1="18" y2="18"/>
                    </svg>
                </button>

                <!-- Brand -->
                <a href="/" class="text-lg font-bold text-foreground no-underline">TaskScore</a>
                <span class="hidden text-sm text-muted-foreground sm:inline">IGC Analysis</span>
            </div>

            <div class="flex items-center gap-2">
                <!-- Events panel toggle -->
                <button
                    id="sidebar-toggle"
                    class="btn btn-ghost"
                    aria-label="Toggle events panel"
                    onclick="document.dispatchEvent(new CustomEvent('basecoat:sidebar', {detail: {id: 'waypoint-sidebar'}}))"
                >
                    Events
                </button>
            </div>
        </header>

        <!-- Main content -->
        <main class="relative flex flex-1 min-h-0 overflow-hidden gap-0">
            <!-- Waypoint Panel Sidebar (slides in from right) -->
            <aside
                id="waypoint-sidebar"
                class="fixed top-14 bottom-0 right-0 z-40 w-80 translate-x-full border-l border-border bg-card transition-transform duration-300"
                aria-hidden="true"
                data-side="right"
            >
                <nav class="flex h-full flex-col" aria-label="Waypoint panel">
                    <!-- Hidden file input -->
                    <input type="file" id="igc-file" accept=".igc" class="hidden">

                    <!-- Event panel container -->
                    <div id="event-panel-container" class="flex flex-1 flex-col overflow-hidden"></div>
                </nav>
            </aside>

            <!-- Sidebar backdrop (mobile only) -->
            <div
                id="sidebar-backdrop"
                class="fixed top-14 bottom-0 left-0 right-0 z-30 hidden bg-black/50 md:hidden"
                onclick="document.dispatchEvent(new CustomEvent('basecoat:sidebar', {detail: {action: 'close', id: 'waypoint-sidebar'}}))"
            ></div>

            <!-- Map container -->
            <div class="relative flex-1 min-h-0 min-w-0">
                <!-- Drop zone overlay -->
                <div id="drop-zone" class="drop-zone">
                    <div class="flex flex-col items-center gap-4 text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" x2="12" y1="3" y2="15"/>
                        </svg>
                        <p class="text-lg">Drop IGC file here</p>
                    </div>
                </div>

                <!-- Map -->
                <div id="map"></div>

                <!-- Status alert overlay -->
                <div class="pointer-events-none absolute left-4 right-4 top-4 z-10 md:left-auto md:max-w-md">
                    <div id="status" class="alert pointer-events-auto" role="alert">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 16v-4"/>
                            <path d="M12 8h.01"/>
                        </svg>
                        <div>
                            <p id="status-message">Ready - drop an IGC file or use the file picker</p>
                        </div>
                        <button
                            class="btn btn-ghost btn-icon -mr-2"
                            onclick="this.closest('.alert').classList.add('hidden')"
                            aria-label="Close alert"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 6 6 18"/>
                                <path d="m6 6 12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Command Menu Dialog -->
    <dialog id="command-dialog" class="command-dialog" onclick="if (event.target === this) this.close()">
        <div class="command">
            <header>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.3-4.3"/>
                </svg>
                <input
                    type="text"
                    placeholder="Search options..."
                    role="combobox"
                    aria-expanded="true"
                    aria-controls="command-menu"
                >
            </header>
            <div role="menu" id="command-menu">
                <!-- File -->
                <div role="group" aria-labelledby="file-heading">
                    <div role="heading" id="file-heading">File</div>
                    <div role="menuitem" id="menu-open-igc" data-keywords="open igc file upload choose">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" x2="12" y1="3" y2="15"/>
                        </svg>
                        <span>Open IGC file</span>
                    </div>
                    <div role="menuitem" id="menu-import-task" data-keywords="import xcontest task code load">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                            <path d="M2 12h20"/>
                        </svg>
                        <span>Import XContest task</span>
                    </div>
                </div>

                <hr role="separator">

                <!-- Display Options -->
                <div role="group" aria-labelledby="display-options-heading">
                    <div role="heading" id="display-options-heading">Display Options</div>
                    <div role="menuitem" id="menu-altitude-colors" data-keywords="altitude colors gradient">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 20V10"/>
                            <path d="M18 20V4"/>
                            <path d="M6 20v-4"/>
                        </svg>
                        <span>Toggle Altitude Colors</span>
                        <span class="text-muted-foreground" id="altitude-colors-status">(off)</span>
                    </div>
                    <div role="menuitem" id="menu-3d-track" data-keywords="3d three dimensional terrain">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m21 16-4 4-4-4"/>
                            <path d="M17 20V4"/>
                            <path d="m3 8 4-4 4 4"/>
                            <path d="M7 4v16"/>
                        </svg>
                        <span>Toggle 3D Track</span>
                        <span class="text-muted-foreground" id="3d-track-status">(off)</span>
                    </div>
                </div>

                <hr role="separator">

                <!-- Sample Flights -->
                <div role="group" aria-labelledby="samples-heading">
                    <div role="heading" id="samples-heading">Sample Flights</div>
                    <div role="menuitem" id="sample-rohan" data-keywords="rohan holt sample flight">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
                        </svg>
                        <span>Rohan Holt</span>
                    </div>
                    <div role="menuitem" id="sample-shane" data-keywords="shane duncan sample flight">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
                        </svg>
                        <span>Shane Duncan</span>
                    </div>
                    <div role="menuitem" id="sample-gordon" data-keywords="gordon rigg sample flight">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
                        </svg>
                        <span>Gordon Rigg</span>
                    </div>
                    <div role="menuitem" id="sample-burkitt" data-keywords="burkitt sample flight">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
                        </svg>
                        <span>Burkitt</span>
                    </div>
                    <div role="menuitem" id="sample-durand" data-keywords="durand sample flight">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
                        </svg>
                        <span>Durand</span>
                    </div>
                    <div role="menuitem" id="sample-holtkamp" data-keywords="holtkamp sample flight">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
                        </svg>
                        <span>Holtkamp</span>
                    </div>
                </div>
            </div>
        </div>
    </dialog>

    <!-- Import Task Dialog -->
    <dialog id="import-task-dialog" class="command-dialog" onclick="if (event.target === this) this.close()">
        <div class="command">
            <header>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                    <path d="M2 12h20"/>
                </svg>
                <input
                    type="text"
                    id="import-task-input"
                    placeholder="Enter task code (e.g., buje)..."
                    autocomplete="off"
                >
            </header>
        </div>
    </dialog>

    <script type="module" src="/analysis/main.ts"></script>
</body>

</html>
