<!DOCTYPE html>
<html>

<head>
    <title>Flight Track - Google Maps</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.95);
            padding: 12px 16px;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 300px;
        }

        .controls h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #94a3b8;
        }

        .controls label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .controls input[type="file"] {
            font-size: 12px;
            max-width: 200px;
        }

        .controls button {
            padding: 8px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .controls button:hover {
            background: #2563eb;
        }

        .status {
            font-size: 12px;
            color: #94a3b8;
        }

        .status.success {
            color: #22c55e;
        }

        .status.error {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <div class="controls">
        <h3>Flight Track Viewer</h3>
        <label>
            <input type="file" id="igc-file" accept=".igc">
        </label>
        <button id="load-sample">Load Sample Track</button>
        <div id="status" class="status">Ready</div>
    </div>

    <script>
        (g => { var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window; b = b[c] || (b[c] = {}); var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => { await (a = m.createElement("script")); e.set("libraries", [...r]); for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]); e.set("callback", c + ".maps." + q); a.src = `https://maps.${c}apis.com/maps/api/js?` + e; d[q] = f; a.onerror = () => h = n(Error(p + " could not load.")); a.nonce = m.querySelector("script[nonce]")?.nonce || ""; m.head.append(a) })); d[l] ? console.warn(p + " only loads once. Ignoring:", g) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)) })({
            key: "AIzaSyDkHC79OXQB3ktFGxt6Kfuz_ZD06g4VBDc",
            v: "weekly"
        });
    </script>

    <script type="module">
        let map = null;
        let flightPath = null;

        /**
         * Parse IGC file content into fixes array
         */
        function parseIGC(content) {
            const lines = content.split(/\r?\n/);
            const fixes = [];

            for (const line of lines) {
                if (!line.startsWith('B')) continue;

                // B record format: BHHMMSSDDMMMMMN/SDDDMMMMMMWVPPPPPGGGGGext
                const match = line.match(/^B(\d{2})(\d{2})(\d{2})(\d{2})(\d{5})([NS])(\d{3})(\d{5})([EW])([AV])(\d{5})(\d{5})/);
                if (!match) continue;

                const [, hours, mins, secs, latDeg, latMin, latDir, lonDeg, lonMin, lonDir, validity, pressAlt, gnssAlt] = match;

                // Parse latitude
                let latitude = parseInt(latDeg) + parseInt(latMin) / 60000;
                if (latDir === 'S') latitude = -latitude;

                // Parse longitude
                let longitude = parseInt(lonDeg) + parseInt(lonMin) / 60000;
                if (lonDir === 'W') longitude = -longitude;

                // Parse altitude
                const altitude = parseInt(gnssAlt);

                fixes.push({ lat: latitude, lng: longitude, altitude });
            }

            return fixes;
        }

        /**
         * Initialize Google Maps
         */
        async function initMap() {
            const { Map } = await google.maps.importLibrary("maps");

            map = new Map(document.getElementById("map"), {
                center: { lat: -36.7, lng: 147.3 },
                zoom: 10,
                mapTypeId: 'terrain',
                mapTypeControl: true,
                mapTypeControlOptions: {
                    mapTypeIds: ['roadmap', 'terrain', 'satellite', 'hybrid']
                }
            });

            updateStatus('Map initialized - load an IGC file', 'success');
        }

        /**
         * Create altitude-based color for a segment
         * Earthy colors (brown) at low altitude, sky colors (blue) at high altitude
         */
        function getAltitudeColor(altitude) {
            if (altitude < 1000) {
                return '#8D6E63'; // brown
            } else if (altitude < 2000) {
                return '#66BB6A'; // green
            } else if (altitude < 3000) {
                return '#29B6F6'; // light blue
            } else {
                return '#81D4FA'; // sky blue
            }
        }

        /**
         * Render flight track on map
         */
        function renderTrack(fixes) {
            if (!map || fixes.length === 0) return;

            // Remove existing flight path
            if (flightPath) {
                flightPath.setMap(null);
            }

            // Create path coordinates
            const path = fixes.map(fix => ({ lat: fix.lat, lng: fix.lng }));

            // Create gradient-colored polyline
            flightPath = new google.maps.Polyline({
                path: path,
                geodesic: true,
                strokeColor: '#00ffff',
                strokeOpacity: 1.0,
                strokeWeight: 3,
                map: map
            });

            // Fit bounds to track
            const bounds = new google.maps.LatLngBounds();
            for (const fix of fixes) {
                bounds.extend({ lat: fix.lat, lng: fix.lng });
            }
            map.fitBounds(bounds, 50);

            const maxAlt = Math.max(...fixes.map(f => f.altitude));
            updateStatus(`Loaded ${fixes.length} fixes - max alt: ${maxAlt}m`, 'success');
        }

        /**
         * Load IGC file
         */
        async function loadIGCFile(file) {
            updateStatus('Loading...', '');

            try {
                const content = await file.text();
                const fixes = parseIGC(content);

                if (fixes.length === 0) {
                    updateStatus('No GPS fixes found in file', 'error');
                    return;
                }

                renderTrack(fixes);
            } catch (err) {
                console.error('Failed to load IGC:', err);
                updateStatus(`Error: ${err.message}`, 'error');
            }
        }

        /**
         * Load sample track
         */
        async function loadSampleTrack() {
            updateStatus('Loading sample track...', '');

            try {
                const response = await fetch('/data/tracks/20260105-132715-GordonRigg.999.igc');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const content = await response.text();
                const fixes = parseIGC(content);

                if (fixes.length === 0) {
                    updateStatus('No GPS fixes found', 'error');
                    return;
                }

                renderTrack(fixes);
            } catch (err) {
                console.error('Failed to load sample:', err);
                updateStatus(`Error: ${err.message}`, 'error');
            }
        }

        /**
         * Update status display
         */
        function updateStatus(message, type) {
            const el = document.getElementById('status');
            el.textContent = message;
            el.className = 'status' + (type ? ` ${type}` : '');
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', async () => {
            await initMap();

            // File input handler
            document.getElementById('igc-file').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) loadIGCFile(file);
            });

            // Sample button handler
            document.getElementById('load-sample').addEventListener('click', loadSampleTrack);
        });
    </script>
</body>

</html>
