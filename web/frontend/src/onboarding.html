<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlideComp - Choose Username</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="min-h-screen flex flex-col items-center justify-center bg-background text-foreground p-6 text-center bg-hills">
  <div id="onboarding" class="max-w-sm w-full hidden">
    <div id="user-avatar" class="mx-auto mb-4 w-16 h-16 rounded-full overflow-hidden bg-muted"></div>
    <h1 class="text-2xl font-bold mb-1">Welcome, <span id="user-name"></span>!</h1>
    <p class="text-muted-foreground mb-6">Choose a username for your profile</p>

    <form id="username-form" class="space-y-4">
      <div class="text-left">
        <label for="username" class="text-sm font-medium mb-1 block">Username</label>
        <input
          id="username"
          type="text"
          class="input w-full"
          placeholder="e.g. sky-pilot"
          minlength="3"
          maxlength="20"
          pattern="[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9]"
          required
          autocomplete="off"
        />
        <p id="username-hint" class="text-xs text-muted-foreground mt-1">3-20 characters, letters, numbers, and hyphens</p>
        <p id="username-error" class="text-xs text-destructive mt-1 hidden"></p>
      </div>
      <button type="submit" class="btn btn-primary w-full">Continue</button>
    </form>

    <p class="text-xs text-muted-foreground mt-6">By continuing, you agree to our <a href="/legal.html" class="underline hover:text-foreground">Privacy Policy & Terms</a>.</p>
  </div>

  <script type="module" src="/onboarding.ts"></script>
</body>

</html>
