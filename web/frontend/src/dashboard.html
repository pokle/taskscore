<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskScore - Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="min-h-screen flex flex-col items-center justify-center bg-background text-foreground p-6 text-center">
  <div id="dashboard" class="max-w-md w-full hidden">
    <h1 class="text-3xl font-bold mb-2">Welcome, <span id="display-name"></span>!</h1>
    <p class="text-muted-foreground mb-8">Your TaskScore dashboard</p>

    <div class="space-y-3">
      <a href="/analysis.html" class="btn btn-primary btn-lg w-full inline-flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          <path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/>
        </svg>
        Open Analysis
      </a>
      <button id="signout-btn" class="btn btn-secondary w-full">Sign out</button>
      <button id="delete-account-btn" class="btn btn-ghost text-destructive w-full">Delete account and all my data</button>
    </div>
  </div>

  <dialog id="delete-account-dialog"
    class="fixed inset-0 m-auto h-fit rounded-lg border border-border bg-card p-0 shadow-lg backdrop:bg-black/50"
    onclick="if (event.target === this) this.close()">
    <div class="w-80 p-4">
      <h2 class="text-lg font-semibold text-destructive">Delete Account</h2>
      <p class="text-sm text-muted-foreground mt-2">
        This will permanently delete your account and all associated data. This action cannot be undone.
      </p>
      <div class="flex justify-end gap-2 mt-4">
        <button id="delete-cancel-btn" class="btn btn-secondary">Cancel</button>
        <button id="delete-confirm-btn" class="btn btn-destructive">Delete my account</button>
      </div>
    </div>
  </dialog>

  <script type="module" src="/dashboard.ts"></script>
</body>

</html>
