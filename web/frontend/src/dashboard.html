<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskScore - Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">

<body class="min-h-screen flex flex-col items-center justify-center bg-background text-foreground p-6 text-center">

    <p class="text-muted-foreground mb-8">Your TaskScore dashboard</p>

    <div class="space-y-3">

          <path d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          <path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/>
        </svg>
        Open Analysis

      <button id="signout-btn" class="btn btn-outline w-full">Sign out</button>
    </div>
  </div>

  <script type="module" src="/dashboard.ts"></script>

</html>
