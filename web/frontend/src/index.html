<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskScore</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="min-h-screen flex flex-col items-center justify-center bg-background text-foreground p-6 text-center">
  <div class="max-w-xl">
    <h1 class="text-4xl font-bold mb-2">TaskScore</h1>
    <p class="text-lg text-muted-foreground mb-6">Competition track log analysis for hanggliding and paragliding</p>

    <img src="/taskscore-screenshot.png" alt="TaskScore analysis interface showing a map with flight tracks and waypoints" class="rounded-lg shadow-lg mb-8 w-full" />

    <a
      href="/analysis.html"
      class="btn btn-primary btn-lg mb-6 inline-flex items-center gap-2"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
        <path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/>
      </svg>
      Open TaskScore
    </a>

  </div>
