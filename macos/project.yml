name: TaskScore
options:
  bundleIdPrefix: info.shonky
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  TaskScoreLib:
    path: .

targets:
  TaskScore:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: TaskScore
        excludes:
          - Resources
      - path: TaskScore/Resources/SampleFlights
        buildPhase: resources
        type: folder
      - path: TaskScore/Resources/AppIcon.icns
        buildPhase: resources
    info:
      path: TaskScore/Info.plist
      properties:
        CFBundleDisplayName: TaskScore
        LSApplicationCategoryType: public.app-category.sports
        NSHighResolutionCapable: true
        UILaunchScreen: {}
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: TaskScoreLib
        product: TaskScoreLib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: info.shonky.taskscore
        PRODUCT_NAME: TaskScore
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        release:
          SWIFT_OPTIMIZATION_LEVEL: -O

schemes:
  TaskScore:
    build:
      targets:
        TaskScore: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
