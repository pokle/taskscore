name: TaskScore
options:
  bundleIdPrefix: info.shonky
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  TaskScoreLib:
    path: .

targets:
  TaskScore:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: TaskScore
        excludes:
          - Resources
    resources:
      - path: TaskScore/Resources/SampleFlights
        buildPhase: resources
      - path: TaskScore/Resources/AppIcon.icns
        buildPhase: resources
    dependencies:
      - package: TaskScoreLib
        product: TaskScoreLib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: info.shonky.taskscore
        PRODUCT_NAME: TaskScore
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TaskScore
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.sports"
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        release:
          SWIFT_OPTIMIZATION_LEVEL: -O

schemes:
  TaskScore:
    build:
      targets:
        TaskScore: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
